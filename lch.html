<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Laurent CHEKLY</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #2B2B2B;
    color: #ECE8DF;
}

/* INTRO */

#intro {
    position: fixed;
    inset: 0;
    background: #2B2B2B;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: introHide 2.4s ease forwards;
}

#intro img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0;
    transform: scale(0.6) rotate(-360deg);
    animation: photoSpin 2.4s cubic-bezier(.16,.84,.35,1) forwards;
}

@keyframes photoSpin {
    0% { opacity: 0; transform: scale(0.6) rotate(-360deg); }
    40% { opacity: 1; }
    80% { transform: scale(1.1) rotate(20deg); }
    100% { transform: scale(1) rotate(0deg); }
}

@keyframes introHide {
    0%   { opacity: 1; visibility: visible; }
    85%  { opacity: 1; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
}

/* HEADER */

.header {
    background: #C6A646;
    color: #2B2B2B;
    text-align: center;
    padding: 60px 20px 40px 20px;
}

.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ECE8DF;
    margin-bottom: 20px;
}

/* ACTIONS */

.actions {
    display: flex;
    background: #2B2B2B;
}

.actions a {
    flex: 1;
    padding: 18px 0;
    background: #C6A646;
    color: #2B2B2B;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s ease;
}

.actions a:hover {
    background: #D4B45A;
}

/* SECTION */

.section {
    padding: 25px;
}

.section h2 {
    color: #C6A646;
}

.item a {
    color: #C6A646;
}

.item a:hover {
    color: #D4B45A;
}

/* FLOATING BUTTONS */

.floating, .share-floating {
    position: fixed;
    right: 25px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #2B2B2B;
    transition: transform 0.18s ease, background 0.2s ease;
}

.floating {
    bottom: 25px;
    background: #C6A646;
}

.floating:hover {
    background: #D4B45A;
}

.share-floating {
    bottom: 100px;
    background: #2B2B2B;
    border: 1px solid #C6A646;
    color: #ECE8DF;
}

.share-floating:hover {
    background: #C6A646;
    color: #2B2B2B;
}

svg {
    width: 26px;
    height: 26px;
    fill: currentColor;
}
</style>
</head>

<body>

<div id="intro">
    <img src="logo_levhec.png" alt="LEVHEC Logo">
</div>

<div class="header">
    <img src="Photo_LCH.png" class="avatar">
    <h1>Laurent CHEKLY</h1>
    <p>Manager de Transition</p>
    <p>Directeur Financier</p>
</div>

<div class="actions">
    <a href="tel:+33676488224">APPELER</a>
    <a href="mailto:laurent.chekly@levhec.com">E-MAIL</a>
</div>

<div class="section">
    <h2>LEVHEC ADVISORY</h2>
    <p>Management de Transition</p>
    <p>Cabinet de Conseil Opérationnel</p>
    <div class="item">📞 06 76 48 82 24</div>
    <div class="item">✉ laurent.chekly@levhec.com</div>
    <div class="item">📍 Paris, France</div>
    <div class="item">🌐 <a href="https://www.levhec-advisory.com">www.levhec-advisory.com</a></div>
    <h2>FAIRE DE LA COMPLEXITE UN AVANTAGE STRATEGIQUE</h2>
</div>

</body>
</html>
