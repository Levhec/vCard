<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #2B2B2B;
    color: #ECE8DF;
}

/* ===== INTRO ===== */

#intro {
    position: fixed;
    inset: 0;
    background: #2B2B2B;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: introHide 2.4s ease forwards;
}

#intro img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0;
    transform: scale(0.6) rotate(-360deg);
    filter: drop-shadow(0 22px 40px rgba(0,0,0,0.55));
    animation: photoSpin 2.4s cubic-bezier(.16,.84,.35,1) forwards;
}

/* Animations */
@keyframes photoSpin {
    0% { opacity: 0; transform: scale(0.6) rotate(-360deg); }
    40% { opacity: 1; }
    80% { transform: scale(1.1) rotate(20deg); }
    100% { transform: scale(1) rotate(0deg); }
}

@keyframes introHide {
    0%   { opacity: 1; visibility: visible; }
    85%  { opacity: 1; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
}

/* ===== HEADER ===== */

.header {
    background: #B08D2F;
    color: #2B2B2B;
    text-align: center;
    padding: 60px 20px 40px 20px;
}

.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ECE8DF;
    margin-bottom: 20px;
}

.header h1 {
    margin: 10px 0 5px;
    font-size: 26px;
}

.header p {
    margin: 5px 0;
    font-size: 16px;
    opacity: 0.9;
}

/* ===== ACTIONS ===== */

.actions {
    display: flex;
    background: #2B2B2B;
    border-top: 1px solid rgba(255,255,255,0.05);
}

.actions a {
    flex: 1;
    padding: 18px 0;
    color: #B08D2F;
    text-decoration: none;
    font-size: 13px;
    transition: background 0.2s ease, color 0.2s ease;
}

.actions a:hover {
    background: rgba(255,255,255,0.05);
    color: #C19A3A;
}

/* ===== SECTION ===== */

.section {
    padding: 25px;
    background: #2B2B2B;
    color: #ECE8DF;
}

.section h2 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #B08D2F;
}

.item {
    margin-bottom: 15px;
    font-size: 15px;
}

.item a {
    color: #B08D2F;
    text-decoration: none;
}

.item a:hover {
    color: #C19A3A;
}

/* ===== BOUTONS FLOTTANTS ===== */

.floating, .share-floating {
    position: fixed;
    right: 25px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ECE8DF;
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.2s ease;
}

.floating:hover,
.share-floating:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 25px rgba(0,0,0,0.35);
}

.floating {
    bottom: 25px;
    background: #B08D2F;
    text-decoration: none;
}

.floating:hover {
    background: #C19A3A;
}

.share-floating {
    bottom: 100px;
    background: #2B2B2B;
    border: 1px solid #B08D2F;
    cursor: pointer;
}

.share-floating:hover {
    background: #B08D2F;
}

svg {
    width: 26px;
    height: 26px;
    fill: #ECE8DF;
}
</style>
