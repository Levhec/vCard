<!DOCTYPE html>

<head>

<title>Laurent CHEKLY</title>

<style>

/* =======================
   BASE
======================= */

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #2B2B2B;
    color: #ECE8DF;
}

svg {
    width: 26px;
    height: 26px;
    fill: currentColor;
}

/* =======================
   INTRO
======================= */

#intro {
    position: fixed;
    inset: 0;
    background: #2B2B2B;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: introHide 2.4s ease forwards;
}

#intro img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0;
    transform: scale(0.6) rotate(-360deg);
    animation: photoSpin 2.4s cubic-bezier(.16,.84,.35,1) forwards;
}

@keyframes photoSpin {
    0% { opacity: 0; transform: scale(0.6) rotate(-360deg); }
    40% { opacity: 1; }
    80% { transform: scale(1.1) rotate(20deg); }
    100% { transform: scale(1) rotate(0deg); }
}

@keyframes introHide {
    0%   { opacity: 1; visibility: visible; }
    85%  { opacity: 1; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
}

/* =======================
   HEADER
======================= */

.header {
    background: #C6A646;
    color: #2B2B2B;
    text-align: center;
    padding: 60px 20px 40px;
}

.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ECE8DF;
    margin-bottom: 20px;
}

.header h1 {
    margin: 10px 0 6px;
}

.header p {
    margin: 4px 0;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.3px;
}

/* =======================
   ACTION BUTTONS
======================= */

.actions {
    display: flex;
}

.actions a {
    flex: 1;
    padding: 18px 0;
    text-align: center;
    background: linear-gradient(180deg, #B08A35 0%, #8F6C28 100%);
    color: #ECE8DF;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s ease;
}

.actions a:hover {
    background: linear-gradient(180deg, #C19A42 0%, #A67C2E 100%);
}

/* =======================
   SECTION
======================= */

.section {
    padding: 25px;
}

.section h2 {
    color: #C6A646;
}

.section p {
    margin: 0;
    line-height: 1.2;
}

/* Brand + Tagline */

.brand {
    font-size: 18px;
    letter-spacing: 1px;
    margin: 18px 0 0;
}

.tagline {
    font-size: 13px;
    letter-spacing: 1.2px;
    font-weight: 500;
    margin-top: 26px;
    opacity: 0.85;
}

/* Contact items */

.item:first-of-type {
    margin-top: 14px;
}

.item a {
    color: #C6A646;
    text-decoration: none;
}

.item a:hover {
    color: #D4B45A;
}

/* =======================
   FLOATING BUTTONS
======================= */

.floating,
.share-floating {
    position: fixed;
    right: 25px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.18s ease, background 0.2s ease;
}

.floating {
    bottom: 25px;
    background: #C6A646;
    color: #2B2B2B;
}

.floating:hover {
    background: #D4B45A;
}

.share-floating {
    bottom: 100px;
    background: #2B2B2B;
    border: 1px solid #C6A646;
    color: #ECE8DF;
}

.share-floating:hover {
    background: #C6A646;
    color: #2B2B2B;
}

</style>
</head>

<body>

<div id="intro">
